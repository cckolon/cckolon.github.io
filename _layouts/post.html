<!doctype html>
<html prefix="og: https://ogp.me/ns#">
  <head>
    {% include head.html %}
    <meta property="og:type" content="article">
    <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
    <meta property="article:author" content="https://carlkolon.com/">
  </head>

  <body hx-boost="true">
    <header>
      <p class="blog-page-header">
        Carl Kolon
        <span class="muted">/ <a href="/blog">Blog</a></span>
      </p>
      {% include x_link.html %}
    </header>
    {% include navigation.html %}
    <hr>
    <header>
      <div class="blog-header">
        <h1 class="blog-title">{{ page.title }}</h1>
        <div class="post-date">{{ page.date | date_to_string }}</div>
      </div>
    </header>
    <main>
      {{ content }}
    </main>
    {% include footer.html %}
  </body>
</html>
